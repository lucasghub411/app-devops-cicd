<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>App DevOps - CI/CD</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; text-align: center; padding-top: 80px; }
        .card { display: inline-block; background: white; padding: 30px 50px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .version { color: #2c7be5; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Pipeline CI/CD - Application de démonstration</h1>
        <p>Version : <span class="version">{{ version }}</span></p>
        <p>{{ message }}</p>
        <p><small>Page générée le {{ current_time }}</small></p>
    </div>
</body>
</html>
